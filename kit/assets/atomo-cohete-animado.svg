<svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg">
  <style>
    .tw{transform-box:fill-box;transform-origin:center;animation:tw 3.4s ease-in-out infinite;animation-delay:var(--d,0s)}
    @keyframes tw{50%{transform:scale(.55) rotate(18deg);opacity:.55}}
    .float{animation:float 5.5s ease-in-out infinite}
    @keyframes float{50%{transform:translateY(-9px)}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
  <rect x="0" y="0" width="480" height="360" rx="28" fill="#16233F"/>
  <g class="tw" style="--d:.4s"><path transform="translate(60,60)" d="M0 -10 L2.3 -2.3 L10 0 L2.3 2.3 L0 10 L-2.3 2.3 L-10 0 L-2.3 -2.3 Z" fill="#F2EDDF" opacity=".8"/></g>
  <g class="tw" style="--d:1.6s"><path transform="translate(430,84)" d="M0 -8 L1.8 -1.8 L8 0 L1.8 1.8 L0 8 L-1.8 1.8 L-8 0 L-1.8 -1.8 Z" fill="#E8A33D"/></g>
  <g class="tw" style="--d:2.4s"><path transform="translate(420,300)" d="M0 -9 L2 -2 L9 0 L2 2 L0 9 L-2 2 L-9 0 L-2 -2 Z" fill="#E98C6B"/></g>
  <circle cx="90" cy="310" r="3" fill="#F2EDDF" opacity=".6"/>
  <circle cx="250" cy="40" r="3" fill="#F2EDDF" opacity=".5"/>
  <g transform="translate(310,185)">
    <g>
      <path id="ka1" d="M -120 0 A 120 44 0 1 1 120 0 A 120 44 0 1 1 -120 0" fill="none" stroke="#F2EDDF" stroke-width="2" opacity=".32"/>
      <circle r="6.5" fill="#E2622B"><animateMotion dur="6s" repeatCount="indefinite"><mpath href="#ka1"/></animateMotion></circle>
    </g>
    <g transform="rotate(60)">
      <path id="ka2" d="M -120 0 A 120 44 0 1 1 120 0 A 120 44 0 1 1 -120 0" fill="none" stroke="#F2EDDF" stroke-width="2" opacity=".32"/>
      <circle r="6.5" fill="#E8A33D"><animateMotion dur="8.5s" repeatCount="indefinite"><mpath href="#ka2"/></animateMotion></circle>
    </g>
    <g transform="rotate(120)">
      <path id="ka3" d="M -120 0 A 120 44 0 1 1 120 0 A 120 44 0 1 1 -120 0" fill="none" stroke="#F2EDDF" stroke-width="2" opacity=".32"/>
      <circle r="6.5" fill="#7FC4B8"><animateMotion dur="11s" repeatCount="indefinite"><mpath href="#ka3"/></animateMotion></circle>
    </g>
    <circle r="13" fill="#E8A33D"/>
    <circle r="22" fill="#E8A33D" opacity=".22"/>
  </g>
  <g transform="translate(50,90)">
    <g class="float">
      <path d="M45 4 Q66 34 66 74 L66 104 L24 104 L24 74 Q24 34 45 4 Z" fill="#F2EDDF"/>
      <path d="M45 4 Q56 20 61 42 L29 42 Q34 20 45 4 Z" fill="#E2622B"/>
      <circle cx="45" cy="66" r="10" fill="#16233F" stroke="#E8A33D" stroke-width="4"/>
      <path d="M24 78 L6 108 L24 104 Z" fill="#E2622B"/>
      <path d="M66 78 L84 108 L66 104 Z" fill="#E2622B"/>
      <path d="M34 106 Q45 134 56 106 Q50 118 45 118 Q40 118 34 106 Z" fill="#E8A33D">
        <animate attributeName="opacity" values="1;.45;1" dur=".5s" repeatCount="indefinite"/>
      </path>
      <path d="M39 106 Q45 124 51 106 Z" fill="#E98C6B">
        <animate attributeName="opacity" values=".5;1;.5" dur=".4s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>
