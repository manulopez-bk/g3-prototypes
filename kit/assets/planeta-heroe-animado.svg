  <g class="tw" style="--d:2s"><path transform="translate(356,338)" d="M0 -13 L3 -3 L13 0 L3 3 L0 13 L-3 3 L-13 0 L-3 -3 Z" fill="#1F7A72"/></g>
  <g class="tw" style="--d:.6s"><path transform="translate(52,320)" d="M0 -9 L2.2 -2.2 L9 0 L2.2 2.2 L0 9 L-2.2 2.2 L-9 0 L-2.2 -2.2 Z" fill="#E2622B"/></g>
  <circle cx="122" cy="38" r="4" fill="#E2622B"/>
  <circle cx="410" cy="210" r="4.5" fill="#E8A33D"/>
  <circle cx="30" cy="196" r="3.5" fill="#1F7A72"/>
  <g class="float">
    <g transform="translate(220,214)">
      <g transform="rotate(-16)">
        <path d="M -152 0 A 152 56 0 0 1 152 0" fill="none" stroke="#E8A33D" stroke-width="11" stroke-linecap="round"/>
        <circle r="94" fill="#1F7A72"/>
        <path d="M -76 -54 A 93 93 0 0 1 -20 -91" stroke="#7FC4B8" stroke-width="11" fill="none" stroke-linecap="round"/>
        <circle cx="30" cy="-34" r="13" fill="#175F59"/>
        <circle cx="-26" cy="30" r="18" fill="#175F59"/>
        <circle cx="44" cy="38" r="9" fill="#175F59"/>
        <path d="M -152 0 A 152 56 0 0 0 152 0" fill="none" stroke="#E8A33D" stroke-width="11" stroke-linecap="round"/>
        <path id="orbita" d="M -168 0 A 168 62 0 1 1 168 0 A 168 62 0 1 1 -168 0" fill="none"/>
        <g>
          <g>
            <path d="M -15 -7 L 5 -7 Q 18 0 5 7 L -15 7 Z" fill="#E2622B"/>
            <circle cx="-1" cy="0" r="3.6" fill="#F7F0E1"/>
            <path d="M -15 -7 L -22 -13 L -19 0 L -22 13 L -15 7 Z" fill="#E8A33D"/>
            <path d="M -21 -3 L -32 0 L -21 3 Z" fill="#E98C6B"/>
          </g>
          <animateMotion dur="14s" repeatCount="indefinite" rotate="auto">
            <mpath href="#orbita"/>
          </animateMotion>
        </g>
      </g>
    </g>
