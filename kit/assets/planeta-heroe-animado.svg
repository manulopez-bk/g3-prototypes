<svg viewBox="0 0 440 420" xmlns="http://www.w3.org/2000/svg">
  <style>
    .tw{transform-box:fill-box;transform-origin:center;animation:tw 3.4s ease-in-out infinite;animation-delay:var(--d,0s)}
    @keyframes tw{50%{transform:scale(.55) rotate(18deg);opacity:.55}}
    .float{transform-box:fill-box;transform-origin:center;animation:float 5.5s ease-in-out infinite}
    @keyframes float{50%{transform:translateY(-9px)}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
  <g class="tw" style="--d:0s"><path transform="translate(64,66)" d="M0 -15 L3.4 -3.4 L15 0 L3.4 3.4 L0 15 L-3.4 3.4 L-15 0 L-3.4 -3.4 Z" fill="#E8A33D"/></g>
